services:
  dashboard:
    container_name: lead-dashboard
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./runs:/app/runs
      - ./artifacts:/app/artifacts
      - ./screenshots:/app/screenshots
      - ./public_outreach:/app/public_outreach
      - ./config:/app/config
    ports:
      - "127.0.0.1:8787:8787"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=5)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

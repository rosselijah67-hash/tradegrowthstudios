# CRM quote pricing catalog. Money is stored in cents.
# Floor prices are internal guardrails and should not appear in client exports.

base_packages:
  site_refresh:
    name: "Site Refresh"
    display_price: "$3,000"
    default_price_cents: 300000
    floor_price_cents: 200000
    quote_range: "$2,000-$3,000"
    description: "A practical website refresh using usable existing content. We clean up the layout, mobile call/request path, core page structure, basic SEO setup, forms/contact path, and launch details."
    best_for: "A contractor with usable copy/photos but a dated site or weak call/request path."
    included:
      - reuse existing copy and content where appropriate
      - redesigned homepage and core pages within agreed scope
      - mobile-first header, phone, and request-path improvements
      - basic metadata, page titles, and SEO structure cleanup
      - contact form or request path improvement
      - launch support and post-launch check
    exclusions:
      - custom quote calculators
      - large content rewrite unless listed
      - paid stock media unless added
      - extensive service-area page buildout
      - paid ad management

  growth_rebuild:
    name: "Growth Rebuild"
    display_price: "$3,500-$5,000"
    default_price_cents: 450000
    floor_price_cents: 350000
    ceiling_price_cents: 500000
    description: "A fuller rebuild for a local service company: cleaner page structure, improved service copy, stronger trust and CTA sections, practical design polish, SEO-ready structure, and a tracking-ready launch."
    best_for: "A trade company with visible website problems and enough services or proof points to justify a fuller rebuild."
    included:
      - everything in Site Refresh
      - 5-8 total pages
      - improved service-page structure
      - stronger hero, trust, and CTA sections
      - content cleanup and rewriting
      - practical visual polish where useful
      - GA4/GTM-ready structure; ad management is not included unless listed
    exclusions:
      - stock photo or video licensing unless added
      - major custom applications or calculators
      - multi-location architecture beyond agreed scope

  conversion_system:
    name: "Conversion System"
    display_price: "$5,000-$10,000"
    default_price_cents: 750000
    floor_price_cents: 500000
    ceiling_price_cents: 1000000
    description: "A larger lead-capture rebuild with service pages, service-area structure, custom request flow, tracking setup, stronger UX, and more design/customization time."
    best_for: "A higher-ticket contractor that needs the site to make calls and quote requests easier to understand, track, and act on."
    included:
      - everything in Growth Rebuild
      - 8-12 total pages
      - service-specific page architecture
      - service-area structure
      - custom request/quote flow
      - GA4/GTM/Search Console setup
      - schema foundation
      - stronger conversion, proof, and trust sections
    exclusions:
      - full custom software
      - complex integrations
      - paid ad strategy or management
      - custom dashboards unless added

  engineered_build:
    name: "Engineered Build"
    display_price: "$10,000+"
    default_price_cents: 1000000
    floor_price_cents: 1000000
    requires_custom_quote: true
    requires_discovery: true
    description: "A custom-coded site or web system that needs discovery before a firm scope. This can include quote calculators, custom dashboards, advanced animations, multi-location systems, workflows, CRM/API integrations, and specialized UX."
    best_for: "Companies that need more than a standard website: custom tools, buying flows, dashboards, or operational systems."
    included:
      - discovery
      - custom technical scope
      - custom-coded components
      - advanced UX or animation where justified
      - integration planning
    exclusions:
      - fixed scope without discovery
      - third-party software costs
      - paid ad management unless separately quoted

recurring_retainers:
  hosting_monitoring:
    name: "Hosting + Monitoring"
    display_price: "$149/mo"
    default_price_cents: 14900
    recurring_interval: monthly
    description: "Managed hosting support with uptime checks, backups, software health checks, light maintenance, and basic issue monitoring."
    client_visible: true
    requires_discovery: false
    notes: "Baseline monthly support."

  managed_web_ops:
    name: "Managed Web Ops"
    display_price: "$399/mo"
    default_price_cents: 39900
    recurring_interval: monthly
    description: "Ongoing web operations after launch: updates, small content changes, tracking checks, form checks, and upkeep of the call/request path."
    client_visible: true
    requires_discovery: false
    notes: "Best default retainer after a rebuild."

  growth_ops:
    name: "Growth Ops"
    display_price: "$900+/mo"
    default_price_cents: 90000
    min_price_cents: 90000
    recurring_interval: monthly
    description: "Monthly support for service-page growth, content planning, conversion-path improvements, reporting, and listed campaign landing-page support."
    client_visible: true
    requires_discovery: true
    notes: "Monthly scope should be confirmed before quote acceptance."

